<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bridge — ASL Translator</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
<style>
:root {
  --bg: #0c0e14;
  --surface: #141824;
  --surface-hover: #1c2233;
  --blue: #7aa2f7;
  --blue-dim: #3d59a1;
  --accent: #bb9af7;
  --gray: #292e42;
  --text: #c0caf5;
  --text-bright: #e0e6ff;
  --text-secondary: #565f89;
  --green: #9ece6a;
  --green-bright: #73daca;
  --red: #f7768e;
  --orange: #ff9e64;
  --yellow: #e0af68;
  --border: #1e2336;
  --glow: rgba(122, 162, 247, 0.08);
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: 'Outfit', sans-serif;
  background: var(--bg);
  color: var(--text);
  height: 100vh;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  background-image:
    radial-gradient(ellipse at 20% 50%, rgba(122, 162, 247, 0.04) 0%, transparent 50%),
    radial-gradient(ellipse at 80% 20%, rgba(187, 154, 247, 0.03) 0%, transparent 50%),
    radial-gradient(ellipse at 50% 80%, rgba(158, 206, 106, 0.02) 0%, transparent 50%);
}

/* ── Top bar ─────────────────────────────────────── */
.topbar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 10px 24px;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
  background: linear-gradient(180deg, rgba(20,24,36,0.9) 0%, rgba(12,14,20,0.95) 100%);
  backdrop-filter: blur(12px);
  animation: slideDown 0.6s ease-out;
}
@keyframes slideDown {
  from { opacity: 0; transform: translateY(-20px); }
  to { opacity: 1; transform: translateY(0); }
}
.topbar-left { display: flex; align-items: baseline; gap: 10px; }
.topbar-left h1 { font-size: 20px; font-weight: 800; letter-spacing: -0.5px; color: var(--text-bright);
  background: linear-gradient(135deg, var(--blue) 0%, var(--accent) 100%);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
.topbar-left span { font-size: 12px; color: var(--text-secondary); font-weight: 300; letter-spacing: 0.5px; }
.topbar-right { display: flex; align-items: center; gap: 16px; }
.status-dot {
  width: 8px; height: 8px; border-radius: 50%;
  background: var(--green);
  display: inline-block;
  animation: pulse 2s infinite;
}
@keyframes pulse {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.5; }
}
@keyframes pulse-mic {
  0%, 100% { box-shadow: 0 0 0 6px rgba(239, 68, 68, 0.2); }
  50% { box-shadow: 0 0 0 12px rgba(239, 68, 68, 0.08); }
}
@keyframes spin {
  to { transform: rotate(360deg); }
}
/* Toast notifications */
.toast {
  position: fixed; bottom: 20px; right: 20px; padding: 10px 18px;
  border-radius: 10px; font-size: 12px; z-index: 9999;
  animation: toastIn 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
  font-family: 'Outfit', sans-serif; font-weight: 500;
  box-shadow: 0 8px 32px rgba(0,0,0,0.3);
  backdrop-filter: blur(8px);
}
.toast.success { background: rgba(158,206,106,0.9); color: #0c0e14; }
.toast.error { background: rgba(247,118,142,0.9); color: #0c0e14; }
.toast.info { background: rgba(122,162,247,0.9); color: #0c0e14; }
@keyframes toastIn {
  from { opacity: 0; transform: translateY(10px); }
  to { opacity: 1; transform: translateY(0); }
}
/* Loading overlay */
.loading-overlay {
  position: absolute; inset: 0; display: flex; flex-direction: column;
  align-items: center; justify-content: center; background: #141414;
  z-index: 10; transition: opacity 0.5s;
}
.loading-overlay.hidden { opacity: 0; pointer-events: none; }
.spinner {
  width: 48px; height: 48px; border: 4px solid #333;
  border-top-color: #2563eb; border-radius: 50%;
  animation: spin 0.8s linear infinite;
}
/* Translating indicator */
.translating-msg {
  opacity: 0.6; font-style: italic;
}
.status-label { font-size: 12px; color: var(--text-secondary); display: flex; align-items: center; gap: 6px; }
.mode-badge {
  font-size: 10px;
  padding: 3px 10px;
  border-radius: 20px;
  background: var(--surface);
  border: 1px solid var(--border);
  color: var(--accent);
  font-family: 'JetBrains Mono', monospace;
  font-weight: 500;
  letter-spacing: 0.5px;
}

/* ── Main area ───────────────────────────────────── */
.main {
  display: flex;
  flex: 1;
  min-height: 0;
}

/* Left panel — webcam */
.panel-left {
  width: 28%;
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  padding: 14px;
  gap: 10px;
  animation: panelIn 0.8s ease-out 0.1s both;
}
@keyframes panelIn {
  from { opacity: 0; transform: translateX(-20px); }
  to { opacity: 1; transform: translateX(0); }
}
.webcam-wrap {
  border-radius: 14px;
  overflow: hidden;
  background: #0a0c12;
  flex-shrink: 0;
  border: 1px solid var(--border);
  box-shadow: 0 4px 24px rgba(0,0,0,0.3);
}
.webcam-wrap img {
  width: 100%;
  display: block;
}
.sign-display {
  background: var(--surface);
  border-radius: 14px;
  padding: 16px;
  text-align: center;
  border: 1px solid var(--border);
  box-shadow: inset 0 1px 0 rgba(255,255,255,0.03);
}
.sign-display .current-sign {
  font-family: 'JetBrains Mono', monospace;
  font-size: 32px;
  font-weight: 700;
  letter-spacing: 3px;
  min-height: 44px;
  transition: all 0.25s ease;
  text-transform: uppercase;
}
.sign-display .current-sign.word { color: var(--green-bright); text-shadow: 0 0 20px rgba(115, 218, 202, 0.3); }
.sign-display .current-sign.letter { color: var(--orange); text-shadow: 0 0 20px rgba(255, 158, 100, 0.3); }
.sign-display .current-sign.idle { color: var(--text-secondary); font-size: 14px; font-weight: 400; font-family: 'Outfit', sans-serif; letter-spacing: 0.5px; text-shadow: none; }
.confidence-bar {
  margin-top: 8px;
  height: 3px;
  border-radius: 2px;
  background: var(--gray);
  overflow: hidden;
}
.confidence-bar .fill {
  height: 100%;
  border-radius: 2px;
  transition: width 0.3s ease, background 0.5s ease;
  box-shadow: 0 0 8px currentColor;
}
.mode-hint {
  margin-top: 8px;
  font-size: 11px;
  color: var(--text-secondary);
}

/* Candidate chips */
.candidates {
  display: flex;
  gap: 6px;
  margin-top: 10px;
  flex-wrap: wrap;
  justify-content: center;
}
.candidate-chip {
  display: flex;
  align-items: center;
  gap: 5px;
  padding: 3px 8px;
  border-radius: 6px;
  background: var(--gray);
  border: 1px solid var(--border);
  font-size: 10px;
  font-family: 'JetBrains Mono', monospace;
  animation: chipIn 0.3s ease-out;
}
@keyframes chipIn {
  from { opacity: 0; transform: translateY(6px) scale(0.9); }
  to { opacity: 1; transform: translateY(0) scale(1); }
}
.candidate-chip.top { border-color: var(--green); background: rgba(158,206,106,0.08); }
.chip-name { font-weight: 600; color: var(--text); }
.chip-prob { color: var(--text-secondary); font-size: 9px; min-width: 24px; text-align: right; }
.chip-bar { width: 28px; height: 2px; background: var(--gray); border-radius: 2px; overflow: hidden; }
.chip-bar .chip-fill { height: 100%; border-radius: 2px; background: var(--green); transition: width 0.3s ease; }

/* Live decoded sentence preview */
.live-sentence {
  margin-top: 10px;
  padding: 8px 12px;
  background: rgba(122, 162, 247, 0.06);
  border: 1px solid rgba(122, 162, 247, 0.15);
  border-radius: 10px;
  font-size: 13px;
  font-weight: 600;
  color: var(--blue);
  text-align: center;
  letter-spacing: 0.5px;
  min-height: 32px;
  transition: all 0.3s ease;
  font-family: 'JetBrains Mono', monospace;
}
.live-sentence:empty { display: none; }

/* Center panel — avatar */
.panel-center {
  width: 30%;
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  padding: 14px;
  gap: 10px;
  animation: panelIn 0.8s ease-out 0.2s both;
}
.avatar-wrap {
  border-radius: 14px;
  overflow: hidden;
  background: linear-gradient(160deg, #0f1320 0%, #0a0c14 100%);
  flex: 1;
  min-height: 0;
  position: relative;
  border: 1px solid var(--border);
  box-shadow: 0 4px 32px rgba(0,0,0,0.4), inset 0 1px 0 rgba(255,255,255,0.02);
}
.avatar-svg {
  position: absolute;
  inset: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  opacity: 0;
  transition: opacity 0.08s ease-in-out;
  padding: 8px;
}
.avatar-svg.active { opacity: 1; }
.avatar-wrap.signing {
  box-shadow: 0 0 30px rgba(115, 218, 202, 0.12), 0 4px 32px rgba(0,0,0,0.4);
  border-color: rgba(115, 218, 202, 0.25);
  transition: box-shadow 0.3s, border-color 0.3s;
}
.avatar-svg svg { width: 100%; height: 100%; border-radius: 8px; }
.avatar-sign-label {
  position: absolute;
  bottom: 12px;
  left: 50%;
  transform: translateX(-50%);
  background: rgba(10,12,18,0.8);
  backdrop-filter: blur(8px);
  color: var(--green-bright);
  font-family: 'JetBrains Mono', monospace;
  font-size: 12px;
  font-weight: 600;
  padding: 4px 16px;
  border-radius: 20px;
  letter-spacing: 2px;
  pointer-events: none;
  transition: opacity 0.3s;
  border: 1px solid rgba(115, 218, 202, 0.2);
  text-transform: uppercase;
}
.avatar-svg.idle svg {
  animation: breathe 3s ease-in-out infinite;
}
@keyframes breathe {
  0% { transform: scale(1) translateY(0); }
  25% { transform: scale(1.005) translateY(-2px) rotate(0.3deg); }
  50% { transform: scale(1.01) translateY(-3px); }
  75% { transform: scale(1.005) translateY(-2px) rotate(-0.3deg); }
  100% { transform: scale(1) translateY(0); }
}
.avatar-status {
  background: var(--surface);
  border-radius: 10px;
  padding: 10px 14px;
  border: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-shrink: 0;
}
.avatar-status .avatar-label {
  font-size: 13px;
  font-weight: 600;
  color: var(--text);
  font-family: 'JetBrains Mono', monospace;
}
.avatar-status .avatar-queue {
  font-size: 10px;
  color: var(--accent);
  font-family: 'JetBrains Mono', monospace;
}

/* Right panel — conversation */
.panel-right {
  width: 42%;
  display: flex;
  flex-direction: column;
  min-height: 0;
  animation: panelIn 0.8s ease-out 0.3s both;
}
.now-recognizing {
  padding: 8px 20px;
  font-size: 11px;
  color: var(--text-secondary);
  border-bottom: 1px solid var(--border);
  min-height: 32px;
  display: flex;
  align-items: center;
  flex-shrink: 0;
  font-family: 'JetBrains Mono', monospace;
  background: rgba(20, 24, 36, 0.5);
}
.now-recognizing .tokens { color: var(--orange); margin-left: 6px; font-weight: 500; }
.conversation {
  flex: 1;
  overflow-y: auto;
  padding: 20px;
  display: flex;
  flex-direction: column;
  gap: 12px;
}

/* Chat bubbles */
.message {
  max-width: 75%;
  animation: fadeIn 0.3s ease-out;
}
@keyframes fadeIn {
  from { opacity: 0; transform: translateY(8px); }
  to { opacity: 1; transform: translateY(0); }
}
.message.signer { align-self: flex-start; }
.message.speaker { align-self: flex-end; }
.msg-header {
  font-size: 11px;
  color: var(--text-secondary);
  margin-bottom: 4px;
  display: flex;
  align-items: center;
  gap: 4px;
}
.message.speaker .msg-header { justify-content: flex-end; }
.msg-bubble {
  padding: 12px 16px;
  border-radius: 16px;
  line-height: 1.6;
  box-shadow: 0 2px 8px rgba(0,0,0,0.2);
}
.message.signer .msg-bubble {
  background: linear-gradient(135deg, var(--blue-dim) 0%, rgba(61,89,161,0.8) 100%);
  border-bottom-left-radius: 4px;
  border: 1px solid rgba(122, 162, 247, 0.15);
}
.message.speaker .msg-bubble {
  background: linear-gradient(135deg, var(--gray) 0%, rgba(41,46,66,0.8) 100%);
  border-bottom-right-radius: 4px;
  border: 1px solid rgba(255,255,255,0.05);
}
.msg-glosses {
  font-size: 10px;
  opacity: 0.6;
  font-family: 'JetBrains Mono', monospace;
  letter-spacing: 0.5px;
}
.msg-english { font-size: 15px; }
.message.signer .msg-glosses { margin-bottom: 4px; }
.message.speaker .msg-glosses { margin-top: 4px; }

.empty-state {
  flex: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  color: var(--text-secondary);
  font-size: 14px;
  text-align: center;
  line-height: 1.8;
}

/* ── Bottom bar ──────────────────────────────────── */
.bottombar {
  display: flex;
  align-items: center;
  padding: 10px 24px;
  border-top: 1px solid var(--border);
  gap: 14px;
  flex-shrink: 0;
  background: linear-gradient(180deg, rgba(12,14,20,0.95) 0%, rgba(10,12,18,1) 100%);
  animation: slideDown 0.6s ease-out 0.4s both;
}
.mic-btn {
  width: 44px; height: 44px;
  border-radius: 50%;
  border: 2px solid var(--border);
  background: var(--surface);
  color: var(--text-secondary);
  font-size: 18px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.3s ease;
  flex-shrink: 0;
}
.mic-btn:hover { border-color: var(--accent); background: var(--surface-hover); transform: scale(1.05); }
.mic-btn.active {
  background: var(--red);
  border-color: var(--red);
  color: white;
  animation: pulse-mic 1.5s infinite;
  box-shadow: 0 0 0 6px rgba(247, 118, 142, 0.15);
}
.mic-label {
  font-size: 11px;
  color: var(--text-secondary);
  flex-shrink: 0;
}
.building-sentence {
  flex: 1;
  font-size: 13px;
  color: var(--text-secondary);
  text-align: center;
  overflow: hidden;
  white-space: nowrap;
  text-overflow: ellipsis;
}
.building-sentence .tokens { color: #f59e0b; }
.bar-actions {
  display: flex;
  gap: 8px;
  flex-shrink: 0;
}
.bar-btn {
  padding: 5px 12px;
  border-radius: 8px;
  border: 1px solid var(--border);
  background: var(--surface);
  color: var(--text-secondary);
  font-size: 11px;
  font-family: 'Outfit', sans-serif;
  font-weight: 500;
  cursor: pointer;
  transition: all 0.2s ease;
  letter-spacing: 0.3px;
}
.bar-btn:hover { background: var(--surface-hover); color: var(--text-bright); border-color: var(--accent); transform: translateY(-1px); }

/* scrollbar */
.conversation::-webkit-scrollbar { width: 5px; }
.conversation::-webkit-scrollbar-track { background: transparent; }
.conversation::-webkit-scrollbar-thumb { background: var(--gray); border-radius: 3px; }
.conversation::-webkit-scrollbar-thumb:hover { background: var(--text-secondary); }

/* Test input */
#test-input {
  font-family: 'JetBrains Mono', monospace !important;
  font-size: 12px !important;
  border-color: var(--border) !important;
  background: var(--surface) !important;
  transition: border-color 0.2s, box-shadow 0.2s;
}
#test-input:focus {
  border-color: var(--blue) !important;
  box-shadow: 0 0 0 3px rgba(122, 162, 247, 0.1) !important;
}
</style>
</head>
<body>

<!-- ── Top bar ──────────────────────────────────────── -->
<div class="topbar">
  <div class="topbar-left">
    <h1>Bridge</h1>
    <span>Real-time ASL Translator</span>
  </div>
  <div class="topbar-right">
    <div class="status-label"><span class="status-dot"></span> Running locally</div>
    <div class="mode-badge" id="mode-badge">Auto</div>
  </div>
</div>

<!-- ── Main ─────────────────────────────────────────── -->
<div class="main">
  <!-- Left: webcam -->
  <div class="panel-left">
    <div class="webcam-wrap">
      <img id="webcam" src="/video_feed" alt="Webcam feed">
    </div>
    <div class="sign-display">
      <div class="current-sign idle" id="current-sign">Waiting for signs...</div>
      <div class="confidence-bar"><div class="fill" id="conf-fill"></div></div>
      <div class="candidates" id="candidates"></div>
      <div class="live-sentence" id="live-sentence"></div>
      <div class="mode-hint" id="mode-hint">Mode: Auto</div>
    </div>
  </div>

  <!-- Center: avatar -->
  <div class="panel-center">
    <div class="avatar-wrap" id="avatar-container">
      <div class="loading-overlay" id="avatar-loading">
        <div class="spinner"></div>
        <div style="color:#666;font-size:12px;margin-top:12px">Loading avatar...</div>
      </div>
      <div class="avatar-svg active idle" id="avatar-svg-a"></div>
      <div class="avatar-svg" id="avatar-svg-b"></div>
      <div class="avatar-sign-label" id="avatar-sign-label"></div>
    </div>
    <div class="avatar-status">
      <div class="avatar-label" id="avatar-sign">Idle</div>
      <div class="avatar-queue" id="avatar-queue"></div>
    </div>
  </div>

  <!-- Right: conversation -->
  <div class="panel-right">
    <div class="now-recognizing" id="now-recognizing">
      Recognizing: <span class="tokens" id="building-tokens">-</span>
    </div>
    <div class="conversation" id="conversation">
      <div class="empty-state" id="empty-state">
        Sign at the camera to translate ASL → English<br>or click the mic to translate Speech → ASL
      </div>
    </div>
  </div>
</div>

<!-- ── Bottom bar ───────────────────────────────────── -->
<div class="bottombar">
  <button class="mic-btn" id="mic-btn" title="Toggle microphone">&#x1f3a4;</button>
  <span class="mic-label" id="mic-label">Tap to listen</span>
  <div class="building-sentence" id="building-sentence"></div>
  <input type="text" id="test-input" placeholder="Type a word to test avatar..."
         style="flex:1;padding:8px 12px;border-radius:8px;border:1px solid #333;background:#1a1a1a;color:#fff;font-size:13px;font-family:Inter,sans-serif;outline:none"/>
  <div style="display:flex;gap:16px;align-items:center;font-size:11px;color:#666">
    <span id="stat-signs">0 signs</span>
    <span id="stat-words">0 words</span>
    <span id="stat-uptime">0m</span>
    <span id="stat-bot" style="color:#22c55e">BOT</span>
  </div>
  <div class="bar-actions">
    <button class="bar-btn" id="clear-btn">Clear</button>
    <button class="bar-btn" id="export-btn">Export</button>
  </div>
</div>

<script>
const socket = io();

const el = {
  currentSign: document.getElementById('current-sign'),
  confFill: document.getElementById('conf-fill'),
  modeHint: document.getElementById('mode-hint'),
  modeBadge: document.getElementById('mode-badge'),
  candidates: document.getElementById('candidates'),
  liveSentence: document.getElementById('live-sentence'),
  conversation: document.getElementById('conversation'),
  emptyState: document.getElementById('empty-state'),
  buildingTokens: document.getElementById('building-tokens'),
  buildingSentence: document.getElementById('building-sentence'),
  micBtn: document.getElementById('mic-btn'),
  micLabel: document.getElementById('mic-label'),
  avatarSign: document.getElementById('avatar-sign'),
  avatarQueue: document.getElementById('avatar-queue'),
};

// ── Toast notifications ──
function showToast(msg, type) {
  const t = document.createElement('div');
  t.className = 'toast ' + (type || 'info');
  t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(() => t.remove(), 3000);
}

// ── Connection status ──
socket.on('connect', () => showToast('Connected to Bridge', 'success'));
socket.on('disconnect', () => showToast('Disconnected — reconnecting...', 'error'));

// ── Hide loading spinner after avatar loads ──
fetch('/avatar_idle_svg').then(r => r.text()).then(svg => {
  document.getElementById('avatar-svg-a').innerHTML = svg;
  setTimeout(() => {
    const loader = document.getElementById('avatar-loading');
    if (loader) loader.classList.add('hidden');
  }, 500);
});

// ── Cycling idle messages ──
const idleMessages = ['Waiting for signs...', 'Show me ASL...', 'Ready when you are!', "Let's sign!", 'Watching for hands...'];
let idleMsgIdx = 0;
let idleMsgInterval = null;
function startIdleMessages() {
  if (idleMsgInterval) return;
  idleMsgInterval = setInterval(() => {
    if (el.currentSign.classList.contains('idle')) {
      el.currentSign.textContent = idleMessages[idleMsgIdx % idleMessages.length];
      idleMsgIdx++;
    }
  }, 2500);
}
function stopIdleMessages() {
  if (idleMsgInterval) { clearInterval(idleMsgInterval); idleMsgInterval = null; }
}
startIdleMessages();

// Track building tokens for the "now recognizing" line
let currentTokens = [];
let signTimeout = null;

// ── Live sign updates (what model currently thinks, shown during signing) ──
socket.on('sign_update', (data) => {
  // Update sign display with live prediction
  el.currentSign.textContent = data.sign;
  el.currentSign.className = 'current-sign ' + data.mode;

  // Confidence bar
  const pct = Math.round(data.confidence * 100);
  el.confFill.style.width = pct + '%';
  el.confFill.style.background = pct > 60 ? '#22c55e' : pct > 40 ? '#f59e0b' : '#ef4444';

  el.modeHint.textContent = 'Recognizing...';

  // Render candidate chips (top 5 predictions)
  if (data.candidates && data.candidates.length > 0) {
    el.candidates.innerHTML = data.candidates.map((c, i) => {
      const p = Math.round(c.prob * 100);
      const cls = i === 0 ? 'candidate-chip top' : 'candidate-chip';
      return '<div class="' + cls + '">' +
        '<span class="chip-name">' + escHtml(c.sign) + '</span>' +
        '<div class="chip-bar"><div class="chip-fill" style="width:' + p + '%"></div></div>' +
        '<span class="chip-prob">' + p + '%</span>' +
      '</div>';
    }).join('');
  }

  // Reset after idle
  clearTimeout(signTimeout);
  signTimeout = setTimeout(() => {
    el.currentSign.className = 'current-sign idle';
    startIdleMessages();
    el.confFill.style.width = '0%';
    el.candidates.innerHTML = '';
    el.liveSentence.textContent = '';
    el.modeHint.textContent = 'Show a sign to the camera';
  }, 3000);
});

// ── Live decoded sentence (continuous stream from LLM decoder) ──────────
socket.on('live_sentence', (data) => {
  if (data.signs && data.signs.length > 0) {
    el.liveSentence.textContent = data.signs.join(' ');
  }
});

// ── Sign committed (sign completed — hands dropped after gesture) ────────
socket.on('sign_committed', (data) => {
  // Add to building tokens
  currentTokens.push(data.sign);
  el.buildingTokens.textContent = currentTokens.join(' ');
  el.buildingSentence.innerHTML = '<span class="tokens">' + currentTokens.join(' ') + '</span>';

  // Flash the committed word
  el.currentSign.textContent = '✓ ' + data.sign;
  el.currentSign.className = 'current-sign word';
});

// ── Sentence complete (pipeline flushed → translated) ────────────────────
socket.on('sentence_complete', (data) => {
  addMessage('signer', data.glosses, data.english);
  currentTokens = [];
  el.buildingTokens.textContent = '-';
  el.buildingSentence.innerHTML = '';
});

// ── Speech transcribed (hearing person spoke) ────────────────────────────
socket.on('speech_transcribed', (data) => {
  addMessage('speaker', data.english, data.asl_glosses.join(' '));
  el.avatarSign.textContent = 'Translating...';
  el.avatarQueue.textContent = data.asl_glosses.length + ' signs';
});

// ── Avatar SVG sign animation ───────────────────────────────────────────
let avatarCurrentLayer = 'a';
const avatarSignQueue = [];
let avatarIsAnimating = false;
let avatarIdleTimeout = null;

// Load idle SVG on startup
fetch('/avatar_idle_svg').then(r => r.text()).then(svg => {
  document.getElementById('avatar-svg-a').innerHTML = svg;
});

socket.on('avatar_sign', (data) => {
  avatarSignQueue.push(data);
  if (!avatarIsAnimating) avatarPlayNext();
});

const avatarContainer = document.getElementById('avatar-container');

// Crossfade: only used between DIFFERENT signs (not between frames of same sign)
function avatarCrossfadeTo(svgContent, sign) {
  avatarContainer.classList.add('signing');
  const next = avatarCurrentLayer === 'a' ? 'b' : 'a';
  const nextEl = document.getElementById('avatar-svg-' + next);
  const currEl = document.getElementById('avatar-svg-' + avatarCurrentLayer);

  nextEl.innerHTML = svgContent;
  nextEl.classList.remove('idle');
  nextEl.classList.add('active');
  currEl.classList.remove('active', 'idle');
  avatarCurrentLayer = next;

  document.getElementById('avatar-sign-label').textContent = sign;
  el.avatarSign.textContent = 'Signing: ' + sign;
}

// Direct replace: used for frames WITHIN the same sign (no flicker)
function avatarDirectReplace(svgContent) {
  const activeEl = document.getElementById('avatar-svg-' + avatarCurrentLayer);
  activeEl.innerHTML = svgContent;
}

function avatarPlayNext() {
  clearTimeout(avatarIdleTimeout);

  if (avatarSignQueue.length === 0) {
    avatarIsAnimating = false;
    el.avatarQueue.textContent = '';
    avatarContainer.classList.remove('signing');
    avatarIdleTimeout = setTimeout(() => {
      if (!avatarIsAnimating) avatarShowIdle();
    }, 3000);
    return;
  }

  avatarIsAnimating = true;
  const item = avatarSignQueue.shift();
  const sign = item.sign;
  const type = item.type || 'svg';
  const frames = item.frames || [];

  el.avatarQueue.textContent = avatarSignQueue.length > 0
    ? avatarSignQueue.length + ' remaining' : '';

  if (type === 'svg_multi' && frames.length > 1) {
    // First frame: crossfade from previous sign
    avatarCrossfadeTo(frames[0], sign);
    let frameIdx = 1;
    const frameTime = 60;  // 60ms per frame — very fast, no flicker

    function showNextFrame() {
      if (frameIdx >= frames.length) {
        setTimeout(avatarPlayNext, 80);
        return;
      }
      // Direct replace on same layer — NO flicker
      avatarDirectReplace(frames[frameIdx]);
      frameIdx++;
      setTimeout(showNextFrame, frameTime);
    }
    setTimeout(showNextFrame, frameTime);
  } else {
    const content = item.content || (frames.length > 0 ? frames[0] : '');
    avatarCrossfadeTo(content, sign);
    setTimeout(avatarPlayNext, 500);
  }
}

function avatarShowIdle() {
  el.avatarSign.textContent = 'Idle';
  document.getElementById('avatar-sign-label').textContent = '';
  // Fetch idle SVG and crossfade to it
  fetch('/avatar_idle_svg').then(r => r.text()).then(svg => {
    const next = avatarCurrentLayer === 'a' ? 'b' : 'a';
    const nextEl = document.getElementById('avatar-svg-' + next);
    const currEl = document.getElementById('avatar-svg-' + avatarCurrentLayer);
    nextEl.innerHTML = svg;
    nextEl.classList.add('active', 'idle');
    currEl.classList.remove('active', 'idle');
    avatarCurrentLayer = next;
  });
}

// ── Mic status ───────────────────────────────────────────────────────────
socket.on('mic_status', (data) => {
  if (data.active) {
    el.micBtn.classList.add('active');
    el.micLabel.textContent = 'Listening...';
  } else {
    el.micBtn.classList.remove('active');
    el.micLabel.textContent = 'Tap to listen';
  }
});

// ── Conversation cleared ─────────────────────────────────────────────────
socket.on('conversation_cleared', () => {
  el.conversation.innerHTML = '';
  el.emptyState = null;
  currentTokens = [];
  el.buildingTokens.textContent = '-';
  el.buildingSentence.innerHTML = '';
});

// ── Add message to conversation ──────────────────────────────────────────
function addMessage(type, primary, secondary) {
  // Remove empty state
  const empty = document.getElementById('empty-state');
  if (empty) empty.remove();

  const msg = document.createElement('div');
  msg.className = 'message ' + type;

  if (type === 'signer') {
    msg.innerHTML =
      '<div class="msg-header">\ud83e\udd1f Signer</div>' +
      '<div class="msg-bubble">' +
        '<div class="msg-glosses">' + escHtml(primary) + '</div>' +
        '<div class="msg-english">' + escHtml(secondary) + '</div>' +
      '</div>';
  } else {
    msg.innerHTML =
      '<div class="msg-header">\ud83c\udfa4 Speaker</div>' +
      '<div class="msg-bubble">' +
        '<div class="msg-english">' + escHtml(primary) + '</div>' +
        '<div class="msg-glosses">' + escHtml(secondary) + '</div>' +
      '</div>';
  }

  el.conversation.appendChild(msg);
  el.conversation.scrollTop = el.conversation.scrollHeight;
}

function escHtml(s) {
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

// ── Button handlers ──────────────────────────────────────────────────────
el.micBtn.addEventListener('click', () => socket.emit('toggle_mic'));

document.getElementById('clear-btn').addEventListener('click', () => {
  socket.emit('clear_conversation');
  el.conversation.innerHTML =
    '<div class="empty-state" id="empty-state">' +
      'Sign at the camera to translate ASL → English<br>or click the mic to translate Speech → ASL' +
    '</div>';
});

// ── Test input: type a word and send to avatar ──────────────────────────
document.getElementById('test-input').addEventListener('keydown', (e) => {
  if (e.key === 'Enter') {
    const text = e.target.value.trim();
    if (text) {
      socket.emit('test_avatar', { text: text });
      e.target.value = '';
    }
  }
});

document.getElementById('export-btn').addEventListener('click', () => {
  const msgs = el.conversation.querySelectorAll('.message');
  let text = 'Bridge — Conversation Transcript\n' + '='.repeat(40) + '\n\n';
  msgs.forEach(m => {
    const who = m.classList.contains('signer') ? 'Signer' : 'Speaker';
    const eng = m.querySelector('.msg-english')?.textContent || '';
    const gloss = m.querySelector('.msg-glosses')?.textContent || '';
    text += who + ': ' + eng + '\n';
    text += '  (' + gloss + ')\n\n';
  });
  const blob = new Blob([text], { type: 'text/plain' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'bridge-transcript.txt';
  a.click();
});

// Keyboard shortcut: space to toggle mic
document.addEventListener('keydown', (e) => {
  if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
  if (e.code === 'Space') {
    e.preventDefault();
    socket.emit('toggle_mic');
  }
});

// ── Live stats polling ──────────────────────────────────────────────────
setInterval(() => {
  fetch('/api/stats').then(r => r.json()).then(s => {
    document.getElementById('stat-signs').textContent = s.signs_recognized + ' signs';
    document.getElementById('stat-words').textContent = s.words_spoken + ' words';
    const m = Math.floor(s.uptime_seconds / 60);
    document.getElementById('stat-uptime').textContent = m + 'm';
    const botEl = document.getElementById('stat-bot');
    if (s.bot_active) {
      botEl.textContent = 'BOT LIVE';
      botEl.style.color = '#22c55e';
    } else {
      botEl.textContent = 'BOT OFF';
      botEl.style.color = '#666';
    }
  }).catch(() => {});
}, 3000);

// ── Sound effect on sign commit ──────────────────────────────────────────
const commitSound = new Audio('data:audio/wav;base64,UklGRl9vT19teleXQA==');
socket.on('sign_committed', (data) => {
  try { commitSound.currentTime = 0; commitSound.play().catch(()=>{}); } catch(e) {}
});
</script>
